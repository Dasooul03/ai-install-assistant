# 生产环境配置 — H2 文件模式 + 禁用 DevTools + 精简日志
# 使用方式: java -jar app.jar --spring.profiles.active=prod
spring:
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false
  datasource:
    url: jdbc:h2:file:./data/installassistant;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect

logging:
  file:
    path: ./logs
  level:
    root: INFO
    com.example.installassistant: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
